name: Daily Telegram to Google Calendar sync

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 10:00 Kyiv (summer) / 09:00 (winter)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install \
            telethon \
            google-api-python-client \
            google-auth-httplib2 \
            python-dotenv \
            tzdata

      - name: Restore secrets to files
        run: |
          mkdir -p data
          echo "${{ secrets.TELEGRAM_SESSION_B64 }}"       | base64 -d > data/telegram_session.session
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}" | base64 -d > data/service_account.json

      - name: Run sync
        env:
          TELEGRAM_API_ID:     ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:   ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_USERNAME:   ${{ secrets.TELEGRAM_USERNAME }}
          TELEGRAM_CHANNEL:    domigri
          GOOGLE_CALENDAR_ID:  shevchenkomb@gmail.com
          EVENT_TIMEZONE:      Europe/Kyiv
          SCAN_LIMIT:          300
        run: python scripts/run_scan.py
